<div class="p-3">

  <div class="tasks-page">


    <div class="d-flex justify-content-between align-items-center px-4">
      <h2 class="page-title">
        Manage Tasks
      </h2>
      <button class="btn add-task-btn" (click)="goToAddTask()">+ Add New Task</button>
    </div>
    <div class="divider"></div>
    <h4>Task List</h4>
    <!-- Table -->
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th>Task</th>
            <th>Status</th>
            <th>Description</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let task of tasks">

            <td>{{ task.title }}</td>
            <td>
              <span class="badge"
                    [ngClass]="
          task.status === 'Completed'
            ? 'bg-success'
            : task.status === 'Pending'
            ? 'bg-warning'
            : task.status === 'Intermediate'
            ? 'bg-primary'
            : 'bg-secondary'
        ">

                {{ task.status }}

              </span>
            </td>
            <td>{{ task.description }}</td>

            <td>
              {{ task.date | date:'dd-MM-yyyy' }}
            </td>

            <td>
              <button class="btn btn-sm btn-primary" (click)="editTask(task.id)">
                <i class="fa-solid fa-pen"></i> Edit
              </button>

              <button class="btn btn-sm btn-danger" (click)="deleteTask(task.id)">
                <i class="fa-solid fa-trash"></i> Delete
              </button>
            </td>

          </tr>
        </tbody>
      </table>
      </div>
    </div>

  </div>
