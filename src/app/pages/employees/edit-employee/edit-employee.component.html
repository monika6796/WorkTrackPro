<div class="employee-form-page">

  <div class="container">

    <!-- Header -->
    <div class="form-header">
      <h2>Edit Employee</h2>
    </div>
     <div class="divider"></div>
    <!-- Form Card -->
    <div class="card form-card">

      <div class="card-body">

        <div class="mb-3">
          <label>Name</label>
          <input type="text" class="form-control" [(ngModel)]="employee.name">
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input type="email" class="form-control" [(ngModel)]="employee.email">
        </div>

        <div class="mb-3">
          <label>Password</label>
          <input type="password" class="form-control" [(ngModel)]="employee.password">
        </div>

        <div class="row">

          <div class="col-md-6 mb-3">
            <label>Role</label>

            <select class="form-control" [(ngModel)]="employee.role">
              <option>Admin</option>
              <option>Employee</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label>Status</label>

            <select class="form-control" [(ngModel)]="employee.status">
              <option value="Active">
                Active
              </option>

              <option value="Inactive">
                Inactive
              </option>
            </select>
          </div>

        </div>

        <button class="btn btn-success w-100"
                (click)="updateEmployee()">

          Update Employee

        </button>
        <p class="text-success text-center mt-3">

          {{ successMessage }}

        </p>

        <p class="text-danger text-center">

          {{ errorMessage }}

        </p>
      </div>

    </div>

  </div>

</div>
